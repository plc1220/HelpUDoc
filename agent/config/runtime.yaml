model:
  provider: gemini
  name: gemini-3.5-flash
  fast_name: gemini-3.5-flash
  lite_name: gemini-3.1-flash-lite-preview
  thinking_level: low
  fast_thinking_level: low
  lite_thinking_level: high
  pro_thinking_level: high
  max_output_tokens: 16384
  pro_max_output_tokens: 32768
  image_name: gemini-3.1-flash-image-preview
  project: my-rd-coe-demo-gen-ai
  location: us-central1
  api_key: ${GEMINI_API_KEY}
  use_vertex_ai: false
backend:
  workspace_root: backend/workspaces
  virtual_mode: true
  skills_root: skills
  sync_skills_to_workspace: false
  implicit_input_guard: true
  code_interpreter:
    enabled: true
    tool_name: eval
    memory_limit_bytes: 67108864
    timeout_seconds: 5.0
    max_ptc_calls: 64
    max_result_chars: 4000
    snapshot_between_turns: true
    ptc_tools:
      - rag_query
      - get_table_schema
      - run_sql_query
      - google_search
      - url_context
  interrupt_on:
    request_plan_approval:
      allowed_decisions:
        - approve
        - edit
        - reject
    write_file: false
    read_file: false
    edit_file: false
tools:
  - name: google_search
    kind: builtin
    description: Gemini-native Google search tool
  - name: url_context
    kind: builtin
    description: Gemini URL context for explicit user-supplied links
  - name: gemini_image
    kind: builtin
    description: Generate or edit images using Gemini
  - name: export_bigquery_query
    kind: builtin
    description: Export read-only BigQuery query results to workspace CSV or Parquet
  - name: create_pdf_from_images
    kind: builtin
    description: Create a multi-page PDF from workspace image files
  - name: data_agent_tools
    entrypoint: helpudoc_agent.data_agent_tools:build_data_agent_tools
    description: Tools for Data Agent (DuckDB, Charts)
  - name: arxiv_search
    entrypoint: helpudoc_agent.arxiv_tools:build_arxiv_tools
    description: Search arXiv and summarize relevant papers
  - name: get_image_url
    kind: builtin
    description: Get public URLs for images stored in MinIO/S3
  - name: rag_query
    kind: builtin
    description: Query LightRAG for workspace context
  - name: append_to_report
    kind: builtin
    description: Stitch generated proposal sections into a final document
  - name: list_skills
    kind: builtin
    description: List available skills and their descriptions
  - name: load_skill
    kind: builtin
    description: Load full skill content from the shared registry
  - name: request_plan_approval
    kind: builtin
    description: Request human approval for a generated execution plan
  - name: request_clarification
    kind: builtin
    description: Pause the run and ask the human for clarification with optional choices
  - name: request_human_action
    kind: builtin
    description: Pause the run and ask the human to choose from arbitrary actions
  - name: run_skill_python_script
    kind: builtin
    description: Run an active skill's declared Python script in a Kubernetes sandbox
mcp_servers:
  - name: toolbox-bq-demo
    transport: http
    url: https://toolbox-452883396851.asia-southeast1.run.app/mcp
    delegated_auth_provider: google
    default_access: allow
    description: Toolbox BigQuery demo MCP (Streamable HTTP)
  - name: google-workspace
    transport: http
    default_access: allow
    url: ${GOOGLE_WORKSPACE_MCP_URL}
    delegatedAuthProvider: google
  - name: google-developer-knowledge
    transport: http
    default_access: allow
    url: https://developerknowledge.googleapis.com/mcp
    delegated_auth_provider: google
    headers_from_env:
      X-goog-user-project: GOOGLE_DEVELOPER_KNOWLEDGE_PROJECT_ID
    description: Official Google Developer Knowledge MCP endpoint for grounded Google documentation retrieval
  - name: aws-pricing
    transport: http
    default_access: allow
    url: http://helpudoc-aws-pricing-mcp:8000/mcp
    description: AWS Pricing MCP served through an in-cluster FastMCP HTTP proxy
  - name: aws-knowledge
    transport: http
    default_access: allow
    url: https://knowledge-mcp.global.api.aws
    description: Hosted AWS Knowledge MCP endpoint
  - name: gcp-cost
    transport: stdio
    default_access: allow
    command: /usr/local/bin/gcp-cost-mcp-wrapper
    env_passthrough:
      - GOOGLE_APPLICATION_CREDENTIALS
      - GOOGLE_CLOUD_PROJECT
      - GOOGLE_CLOUD_QUOTA_PROJECT
      - GCP_COST_SERVICE_ACCOUNT_JSON
      - GCP_COST_SERVICE_ACCOUNT_JSON_B64
    description: GCP Cost MCP server for Google Cloud pricing and cost estimation via the Cloud Billing Catalog API
