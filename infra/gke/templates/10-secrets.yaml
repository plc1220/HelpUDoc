apiVersion: v1
kind: Secret
metadata:
  name: helpudoc-secrets
  namespace: helpudoc
type: Opaque
stringData:
  SESSION_SECRET: replace-me
  POSTGRES_PASSWORD: replace-me
  MINIO_ROOT_USER: replace-me
  MINIO_ROOT_PASSWORD: replace-me
  GEMINI_API_KEY: replace-me
  RAG_LLM_API_KEY: replace-me
  AGENT_JWT_SECRET: replace-me
  # Demo: MCP auth for toolbox-bq-demo (Streamable HTTP).
  # Set to a valid bearer token if you want BigQuery MCP tools to work.
  BQ_ACCESS_TOKEN: replace-me
  CLICKHOUSE_PASSWORD: replace-me
  LANGFUSE_NEXTAUTH_SECRET: replace-me
  LANGFUSE_SALT: replace-me
  LANGFUSE_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
  LANGFUSE_PUBLIC_KEY: lf_pk_replace_me
  LANGFUSE_SECRET_KEY: lf_sk_replace_me
  LANGFUSE_INIT_USER_PASSWORD: replace-me
