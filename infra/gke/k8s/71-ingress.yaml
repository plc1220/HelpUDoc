apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: helpudoc-managed-cert-main
  namespace: helpudoc
spec:
  # Replace with your real domain and point its DNS A record at the Ingress IP.
  domains:
    - aiengine-dev.skp.gov.my
    # - www.aiengine-dev.skp.gov.my

# ---
