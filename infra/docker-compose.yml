# Langfuse UI: http://localhost:3300 (default login LANGFUSE_INIT_USER_EMAIL / LANGFUSE_INIT_USER_PASSWORD).
# If postgres_data already existed before postgres-init was added, create DB manually:
#   docker compose exec postgres psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "CREATE DATABASE langfuse;"
x-langfuse-env: &langfuse-env
  NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3300}
  NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-langfuse-nextauth-secret-change-me}
  DATABASE_URL: postgresql://${POSTGRES_USER:-helpudoc}:${POSTGRES_PASSWORD:-helpudoc}@postgres:5432/langfuse
  SALT: ${LANGFUSE_SALT:-langfuse-local-salt-change-me}
  ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  TELEMETRY_ENABLED: ${LANGFUSE_TELEMETRY_ENABLED:-false}
  CLICKHOUSE_MIGRATION_URL: ${CLICKHOUSE_MIGRATION_URL:-clickhouse://clickhouse:9000}
  CLICKHOUSE_URL: ${CLICKHOUSE_URL:-http://clickhouse:8123}
  CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
  CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
  CLICKHOUSE_CLUSTER_ENABLED: "false"
  REDIS_CONNECTION_STRING: ${LANGFUSE_REDIS_URL:-redis://redis:6379/1}
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${LANGFUSE_S3_BUCKET:-langfuse}
  LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
  LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: ${LANGFUSE_S3_BUCKET:-langfuse}
  LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
  LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
  LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
  LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/

services:
  postgres:
    image: postgres:16
    container_name: helpudoc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-helpudoc}
      POSTGRES_USER: ${POSTGRES_USER:-helpudoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helpudoc}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-helpudoc} -d ${POSTGRES_DB:-helpudoc}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: helpudoc-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: helpudoc-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-helpudoc}
    entrypoint: ["/bin/sh", "-c"]
    command: >
      set -euo pipefail;
      until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do
        sleep 1;
      done;
      mc mb -p local/"$${S3_BUCKET_NAME}" || true;
      mc mb -p local/langfuse || true;
      mc anonymous set download local/"$${S3_BUCKET_NAME}";
      exit 0;

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: helpudoc-clickhouse
    restart: unless-stopped
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-clickhouse}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ports:
      - "127.0.0.1:18123:8123"
      - "127.0.0.1:19000:9000"
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: helpudoc-langfuse-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
    environment:
      <<: *langfuse-env
    ports:
      - "127.0.0.1:3030:3030"

  langfuse-web:
    image: langfuse/langfuse:3
    container_name: helpudoc-langfuse-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      clickhouse:
        condition: service_healthy
    environment:
      <<: *langfuse-env
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-helpudoc}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-HelpUDoc}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-helpudoc-local}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-local}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-lf_pk_helpudoc_local}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-lf_sk_helpudoc_local}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@local.com}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-admin}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-langfuse}
    ports:
      - "3300:3000"

  google-workspace-mcp:
    image: python:3.13-slim
    restart: unless-stopped
    environment:
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      MCP_ENABLE_OAUTH21: "true"
      EXTERNAL_OAUTH21_PROVIDER: "true"
      WORKSPACE_MCP_STATELESS_MODE: "true"
      WORKSPACE_MCP_HOST: 0.0.0.0
      WORKSPACE_MCP_PORT: 8000
      WORKSPACE_MCP_BASE_URI: http://google-workspace-mcp
      PORT: 8000
    command:
      - /bin/sh
      - -lc
      - pip install --no-cache-dir workspace-mcp && workspace-mcp --transport streamable-http --tools gmail drive calendar sheets
    ports:
      - "8000:8000"

  backend:
    build:
      context: ../backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET:-change-me}
      SESSION_NAME: ${SESSION_NAME:-helpudoc.sid}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-604800}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_SAVE_UNINITIALIZED: ${SESSION_SAVE_UNINITIALIZED:-}
      AUTH_MODE: ${AUTH_MODE:-hybrid}
      AGENT_JWT_SECRET: ${AGENT_JWT_SECRET:-helpudoc-local-dev-agent-jwt-secret}
      DEFAULT_USER_ID: ${DEFAULT_USER_ID:-local-admin@local.com}
      DEFAULT_USER_NAME: ${DEFAULT_USER_NAME:-admin}
      DEFAULT_USER_EMAIL: ${DEFAULT_USER_EMAIL:-admin@local.com}
      AGENT_URL: ${AGENT_URL:-http://agent:8001}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-helpudoc}
      POSTGRES_USER: ${POSTGRES_USER:-helpudoc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helpudoc}
      DATABASE_URL: postgres://${POSTGRES_USER:-helpudoc}:${POSTGRES_PASSWORD:-helpudoc}@postgres:5432/${POSTGRES_DB:-helpudoc}
      REDIS_URL: redis://redis:6379
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-helpudoc}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://localhost:9000/helpudoc}
      S3_FORCE_PATH_STYLE: "true"
      WORKSPACE_ROOT: /app/workspaces
      FILE_UNDERSTANDING_AGENT_READS_WORKSPACE: "true"
      SKILLS_ROOT: /app/skills
      AGENT_CONFIG_PATH: /agent/config/runtime.yaml
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@local.com}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:3000/api/auth/google/callback}
      GOOGLE_OAUTH_POST_LOGIN_REDIRECT: ${GOOGLE_OAUTH_POST_LOGIN_REDIRECT:-http://localhost:5173/login}
      GOOGLE_OAUTH_SCOPES: ${GOOGLE_OAUTH_SCOPES:-openid email profile https://www.googleapis.com/auth/bigquery https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/gmail.compose https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/spreadsheets.readonly}
      OAUTH_TOKEN_ENCRYPTION_KEY: ${OAUTH_TOKEN_ENCRYPTION_KEY:-}
    ports:
      - "3000:3000"
    volumes:
      - workspace_data:/app/workspaces
      - skills_data:/app/skills
      - ../agent/config:/agent/config

  agent:
    build:
      context: ..
      dockerfile: agent/Dockerfile
    depends_on:
      backend:
        condition: service_started
    environment:
      REDIS_URL: redis://redis:6379
      RAG_OFFLINE: ${RAG_OFFLINE:-true}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      RAG_LLM_API_KEY: ${RAG_LLM_API_KEY:-}
      # Demo: MCP auth for toolbox-bq-demo.
      BQ_ACCESS_TOKEN: ${BQ_ACCESS_TOKEN:-}
      GOOGLE_WORKSPACE_MCP_URL: ${GOOGLE_WORKSPACE_MCP_URL:-http://google-workspace-mcp:8000/mcp}
      LLM_MODEL: ${LLM_MODEL:-gemini-flash-latest}
      AGENT_JWT_SECRET: ${AGENT_JWT_SECRET:-helpudoc-local-dev-agent-jwt-secret}
      WORKSPACE_ROOT: /app/workspaces
      AGENT_CONFIG_PATH: /agent/config/runtime.yaml
      S3_ENDPOINT: http://minio:9000
      MINIO_ENDPOINT: http://minio:9000
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-helpudoc}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://localhost:9000/helpudoc}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-http://langfuse-web:3000}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-lf_pk_helpudoc_local}}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-${LANGFUSE_INIT_PROJECT_SECRET_KEY:-lf_sk_helpudoc_local}}
      LANGFUSE_TRACING_ENABLED: ${LANGFUSE_TRACING_ENABLED:-true}
    ports:
      - "8001:8001"
    volumes:
      - workspace_data:/app/workspaces
      - skills_data:/app/skills
      - skills_data:/skills
      - ../agent/config:/agent/config

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${FRONTEND_API_URL:-/api}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-16646144790-fvdv7liepgo18aiu20n3btmdr56l33pq.apps.googleusercontent.com}
        VITE_AUTH_MODE: ${VITE_AUTH_MODE:-hybrid}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:80"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clickhouse_data:
  clickhouse_logs:
  workspace_data:
  skills_data:
