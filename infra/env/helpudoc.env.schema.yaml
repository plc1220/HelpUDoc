    description: PVC name mounted into sandbox pods.

  HELPUDOC_SANDBOX_RUNTIME_CLASS:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: gvisor
    description: Kubernetes runtimeClassName for gVisor isolation.

  HELPUDOC_SANDBOX_CPU_LIMIT:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: 500m
    description: CPU limit for sandbox pods.

  HELPUDOC_SANDBOX_MEMORY_LIMIT:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: 512Mi
    description: Memory limit for sandbox pods.

  HELPUDOC_SANDBOX_EPHEMERAL_STORAGE_LIMIT:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: 1Gi
    description: Ephemeral storage limit for sandbox pods.

  HELPUDOC_SANDBOX_POLL_INTERVAL_SECONDS:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: "1"
    description: Poll interval when waiting for sandbox Job completion.

  HELPUDOC_SANDBOX_ALLOW_KUBECONFIG:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: "false"
    description: Dangerous dev escape hatch to use kubeconfig from the agent process.

  # --- BigQuery / GCP tooling ---
  GOOGLE_CLOUD_PROJECT:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Default GCP project for BigQuery export tools.

  BIGQUERY_LOCATION:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: BigQuery location for export tools.

  BQ_ACCESS_TOKEN:
    owner: agent
    secret: true
    local: optional
    prod: optional
    default: ""
    description: Optional short-lived BigQuery OAuth access token for tools.

  GOOGLE_GENAI_USE_VERTEXAI:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Example overlay for Vertex AI routing.

  GOOGLE_CLOUD_LOCATION:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Example overlay for Vertex region.

  IMAGE_GEN_MODEL:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Example overlay for image generation model id.

  IMAGE_GEN_API_KEY:
    owner: agent
    secret: true
    local: optional
    prod: optional
    default: ""
    description: Example overlay API key for image generation.

  AWS_PRICING_MCP_LOG_LEVEL:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Log level for AWS pricing MCP integration.

  GCP_COST_SERVICE_ACCOUNT_JSON:
    owner: backend
    secret: true
    local: optional
    prod: optional
    default: ""
    description: JSON for GCP cost tooling service account.

  GCP_COST_SERVICE_ACCOUNT_JSON_B64:
    owner: backend
    secret: true
    local: optional
    prod: optional
    default: ""
    description: Base64-encoded service account JSON for cost tooling.

  # --- Langfuse bootstrap (GKE templates) ---
  LANGFUSE_INIT_ORG_ID:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Headless Langfuse org id seed.

  LANGFUSE_INIT_ORG_NAME:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Headless Langfuse org name seed.

  LANGFUSE_INIT_PROJECT_ID:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Headless Langfuse project id seed.

  LANGFUSE_INIT_PROJECT_NAME:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Headless Langfuse project name seed.

  LANGFUSE_INIT_USER_EMAIL:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Headless Langfuse admin email seed.

  LANGFUSE_INIT_USER_NAME:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Headless Langfuse admin display name seed.

  LANGFUSE_INIT_USER_PASSWORD:
    owner: backend
    secret: true
    local: optional
    prod: optional
    default: ""
    description: Headless Langfuse admin password seed.

  LANGFUSE_NEXTAUTH_SECRET:
    owner: backend
    secret: true
    local: optional
    prod: optional
    default: ""
    description: NextAuth secret for Langfuse deployment.

  LANGFUSE_SALT:
    owner: backend
    secret: true
    local: optional
    prod: optional
    default: ""
    description: Langfuse salt for credential hashing.

  LANGFUSE_ENCRYPTION_KEY:
    owner: backend
    secret: true
    local: optional
    prod: optional
    default: ""
    description: Langfuse encryption key (64 hex chars for v3).

  CLICKHOUSE_PASSWORD:
    owner: backend
    secret: true
    local: optional
    prod: optional
    default: ""
    description: ClickHouse password bundled with Langfuse on GKE.

  # --- Frontend (Vite) ---
  VITE_API_URL:
    owner: frontend
    secret: false
    local: optional
    prod: required
    default: "/api (frontend Dockerfile.gke / GKE); http://localhost:3000/api (local Vite + dev backend)"
    description: >
      Browser-accessible backend API base URL. Local `npm run dev` typically uses
      http://localhost:3000/api. Production and container image builds default to same-origin
      `/api` (see frontend Dockerfile.gke `ARG VITE_API_URL=/api`) so the SPA talks to the API
      behind the ingress without hard-coding a host.

  VITE_AUTH_MODE:
    owner: frontend
    secret: false
    local: optional
    prod: required
    default: hybrid
    description: Must align with backend AUTH_MODE semantics for login UX.

  VITE_A2UI_NATIVE_ENABLED:
    owner: frontend
    secret: false
    local: optional
    prod: optional
    default: "true"
    description: Enables native A2UI rendering for agent interrupts when set to true.

  VITE_COLLAB_URL:
    owner: frontend
    secret: false
    local: optional
    prod: optional
    default: ws://localhost:1234
    description: Collaboration WebSocket URL.

  VITE_GOOGLE_CLIENT_ID:
    owner: frontend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Google OAuth client id for the SPA (public).

  VITE_DEBUG_STREAM:
    owner: frontend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Enables verbose stream debugging in the browser console.
