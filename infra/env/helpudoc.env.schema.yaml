# Canonical environment variable catalog for HelpUDoc.
# Used by operators and by scripts/validate-env (see backend npm run validate:env).
#
# Fields:
#   owner: backend | agent | frontend | shared
#   secret: true if the value must never be committed or logged
#   local: optional | recommended | required — for typical local dev (direct or compose)
#   prod: optional | recommended | required — for GKE / production
#   default: documented default when unset (string or empty)
#   description: human summary
#   deprecated_aliases: older names still read by code (prefer the primary name)

version: 1

variables:
  # --- Loader / process ---
  ENV_FILE:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Optional path to a dotenv file consumed by backend and agent before other config.

  NODE_ENV:
    owner: shared
    secret: false
    local: optional
    prod: recommended
    default: ""
    description: Node-style environment name; agent uses it for local/dev workspace validation and tracing tags.

  PORT:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: "3000"
    description: HTTP listen port for the backend API.

  COLLAB_PORT:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: "1234"
    description: Port for the Yjs collaboration WebSocket server.

  FRONTEND_URL:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Fallback public origin for OAuth post-login redirect when GOOGLE_OAUTH_POST_LOGIN_REDIRECT is unset.

  # --- Sessions ---
  SESSION_SECRET:
    owner: backend
    secret: true
    local: required
    prod: required
    default: "dev-secret-change-me"
    description: Secret for signing express-session cookies; must be strong in production.

  SESSION_NAME:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: helpudoc.sid
    description: Cookie name for the session id.

  SESSION_TTL_SECONDS:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: "604800"
    description: Session max age in seconds (rolling).

  SESSION_COOKIE_SECURE:
    owner: backend
    secret: false
    local: optional
    prod: recommended
    default: "true in production when NODE_ENV=production"
    description: Force Secure cookie flag; when unset, defaults from NODE_ENV.

  SESSION_COOKIE_DOMAIN:
    owner: backend
    secret: false
    local: optional
    prod: recommended
    default: ""
    description: Optional cookie Domain attribute for cross-subdomain sessions.

  SESSION_SAVE_UNINITIALIZED:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: "false"
    description: express-session saveUninitialized override.

  # --- Auth ---
  AUTH_MODE:
    owner: backend
    secret: false
    local: optional
    prod: required
    default: headers
    description: Backend auth mode (headers, hybrid, oidc, etc.).

  DEFAULT_USER_ID:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Default user id for header-auth local dev.

  DEFAULT_USER_NAME:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: Local User
    description: Display name for header-auth and collab when no session user.

  DEFAULT_USER_EMAIL:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Email for header-auth local dev.

  ADMIN_EMAILS:
    owner: backend
    secret: false
    local: optional
    prod: recommended
    default: ""
    description: Comma-separated admin emails for bootstrap RBAC.

  AGENT_JWT_SECRET:
    owner: shared
    secret: true
    local: optional
    prod: required
    default: ""
    description: Shared secret for agent JWT validation; must match between backend and agent in production.

  # --- Database ---
  DATABASE_URL:
    owner: shared
    secret: true
    local: recommended
    prod: recommended
    default: ""
    description: Postgres connection URL; when set, overrides discrete POSTGRES_* fields.

  DATABASE_SSL:
    owner: backend
    secret: false
    local: optional
    prod: recommended
    default: "false"
    description: SSL mode for Postgres (false, strict, allow, skip-verify).

  POSTGRES_HOST:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: localhost
    description: Postgres host when DATABASE_URL is unset.

  POSTGRES_PORT:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: "5432"
    description: Postgres port.

  POSTGRES_DB:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: helpudoc
    description: Postgres database name.

  POSTGRES_USER:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: helpudoc
    description: Postgres user.

  POSTGRES_PASSWORD:
    owner: shared
    secret: true
    local: required
    prod: required
    default: ""
    description: Postgres password.

  DB_POOL_MIN:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: "0"
    description: Knex pool minimum.

  DB_POOL_MAX:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: "10"
    description: Knex pool maximum.

  AGENT_STORE_DATABASE_URL:
    owner: agent
    secret: true
    local: optional
    prod: optional
    default: ""
    description: Optional dedicated DB URL for agent memory/checkpoint store.

  AGENT_STORE_USE_IN_MEMORY:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: When truthy, use in-memory agent store (tests/dev).

  # --- Redis ---
  REDIS_URL:
    owner: backend
    secret: false
    local: recommended
    prod: required
    default: redis://127.0.0.1:6379
    description: Redis URL for sessions and agent run streams.

  RAG_REDIS_URL:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Optional Redis URL for RAG worker; falls back to REDIS_URL.

  RAG_INDEX_STREAM:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: helpudoc:rag:index-jobs
    description: Redis stream key for RAG index jobs.

  RAG_INDEX_GROUP:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: helpudoc-rag-indexers
    description: Redis consumer group for RAG worker.

  RAG_INDEX_CONSUMER:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Optional explicit consumer name for RAG worker.

  # --- Object storage ---
  S3_BUCKET_NAME:
    owner: shared
    secret: false
    local: optional
    prod: required
    default: helpudoc
    description: S3/MinIO bucket for workspace files.

  S3_ENDPOINT:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Custom S3 API endpoint (e.g. MinIO).

  MINIO_ENDPOINT:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Deprecated alias for S3_ENDPOINT (still read).

  S3_FORCE_PATH_STYLE:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: "true when custom endpoint set"
    description: Path-style addressing for S3-compatible APIs.

  S3_PUBLIC_BASE_URL:
    owner: backend
    secret: false
    local: optional
    prod: required
    default: ""
    description: Browser-reachable base URL prefix for object GETs.

  AWS_REGION:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: us-east-1
    description: AWS region string for S3 client configuration.

  AWS_ACCESS_KEY_ID:
    owner: shared
    secret: true
    local: optional
    prod: required
    default: ""
    description: S3 access key id.

  AWS_SECRET_ACCESS_KEY:
    owner: shared
    secret: true
    local: optional
    prod: required
    default: ""
    description: S3 secret key.

  AWS_SESSION_TOKEN:
    owner: shared
    secret: true
    local: optional
    prod: optional
    default: ""
    description: Optional temporary session token for AWS.

  MINIO_ROOT_USER:
    owner: shared
    secret: true
    local: optional
    prod: optional
    default: ""
    description: Deprecated alias for AWS_ACCESS_KEY_ID in local MinIO setups.

  MINIO_ROOT_PASSWORD:
    owner: shared
    secret: true
    local: optional
    prod: optional
    default: ""
    description: Deprecated alias for AWS_SECRET_ACCESS_KEY in local MinIO setups.

  # --- Agent service ---
  AGENT_URL:
    owner: backend
    secret: false
    local: recommended
    prod: required
    default: http://localhost:8001
    description: Base URL for the FastAPI agent service.

  AGENT_CONFIG_PATH:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Path to agent runtime.yaml; repo-relative or absolute.

  AGENT_CONFIG_DIR:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Directory containing runtime.yaml when AGENT_CONFIG_PATH is unset.

  WORKSPACE_ROOT:
    owner: shared
    secret: false
    local: recommended
    prod: required
    default: ""
    description: Root directory for workspace files; overrides YAML in agent settings.

  SKILLS_ROOT:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Skills directory root; defaults to repo skills/ (read by backend and agent).

  PLUGINS_ROOT:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Plugin manifest directory root; defaults to repo plugins/ (read by backend and agent).

  ENABLE_SKILL_BUILDER_ASSISTANT:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: "true"
    description: Feature flag for skill builder assistant routes.

  ENABLE_GITHUB_SKILL_IMPORTER:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: "true"
    description: Feature flag for GitHub skill import.

  ENABLE_SKILL_SANDBOX_RUNNER:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: "false"
    description: Enable Kubernetes sandbox execution for skills.

  ENABLE_SKILL_SCRIPT_RUNNER:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Deprecated alias for ENABLE_SKILL_SANDBOX_RUNNER.

  # --- Google OAuth ---
  GOOGLE_OAUTH_CLIENT_ID:
    owner: backend
    secret: false
    local: optional
    prod: required
    default: ""
    description: Google OAuth web client id.

  GOOGLE_OAUTH_CLIENT_SECRET:
    owner: backend
    secret: true
    local: optional
    prod: required
    default: ""
    description: Google OAuth client secret.

  GOOGLE_OAUTH_REDIRECT_URI:
    owner: backend
    secret: false
    local: optional
    prod: required
    default: ""
    description: Registered OAuth redirect URI on the backend.

  GOOGLE_OAUTH_POST_LOGIN_REDIRECT:
    owner: backend
    secret: false
    local: optional
    prod: required
    default: ""
    description: Browser URL to open after successful OAuth (often frontend /login).

  GOOGLE_OAUTH_SCOPES:
    owner: backend
    secret: false
    local: optional
    prod: recommended
    default: ""
    description: Space or comma separated OAuth scopes; defaults to built-in set when empty.

  GOOGLE_WORKSPACE_MCP_URL:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Base URL for hosted Google Workspace MCP when used.

  GOOGLE_DEVELOPER_KNOWLEDGE_PROJECT_ID:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: GCP project hint for developer-knowledge integrations.

  OAUTH_TOKEN_ENCRYPTION_KEY:
    owner: backend
    secret: true
    local: optional
    prod: required
    default: ""
    description: 32-byte base64url key for encrypting stored OAuth refresh tokens.

  # --- LLM / embeddings (agent + RAG) ---
  GEMINI_API_KEY:
    owner: shared
    secret: true
    local: required
    prod: required
    default: ""
    description: API key for Gemini models (agent default and RAG when not using Vertex).

  GOOGLE_API_KEY:
    owner: agent
    secret: true
    local: optional
    prod: optional
    default: ""
    description: Alternate env name for Gemini API key in some code paths.

  GOOGLE_CLOUD_API_KEY:
    owner: agent
    secret: true
    local: optional
    prod: optional
    default: ""
    description: Used by some Gemini tooling as an API key source.

  RAG_LLM_API_KEY:
    owner: agent
    secret: true
    local: optional
    prod: optional
    default: ""
    description: Optional separate API key for RAG LLM calls.

  LLM_BINDING_API_KEY:
    owner: agent
    secret: true
    local: optional
    prod: optional
    default: ""
    description: LightRAG-style override for LLM API key.

  LLM_BINDING_HOST:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Optional custom base URL for LLM binding.

  LLM_MODEL:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: gemini-3.5-flash
    description: Default chat model name for RAG and examples.

  RAG_LLM_MODEL:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Overrides LLM_MODEL for RAG indexing/query.

  RAG_EMBEDDING_MODEL:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Embedding model id for RAG.

  EMBEDDING_MODEL:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Example overlay default for embeddings.

  RAG_EMBEDDING_DIM:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Embedding vector dimension override.

  EMBEDDING_DIM:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Example overlay for embedding dimension.

  RAG_OFFLINE:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: "false"
    description: When true, RAG skips live LLM/embed calls (dev).

  RAG_WORKING_DIR:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: LightRAG working directory under workspace.

  RAG_MAX_FILE_BYTES:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Max indexed file size.

  RAG_MAX_TEXT_CHARS:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Max extracted text length per document.

  RAG_PARSER_PIPELINE:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: docling
    description: Parser pipeline name for document attachment understanding.

  RAGANYTHING_PARSER:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: docling
    description: Legacy parser selection variable; retained for compatibility and expected to be docling.

  PARSER:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Deprecated alias for parser selection; prefer RAGANYTHING_PARSER.

  PARSER_ENRICHMENT_MODE:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Enrichment mode override; may alias PARSER in some paths.

  RAGANYTHING_PARSE_METHOD:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: auto
    description: Legacy RAGAnything parse method; no longer used by the default Docling parser path.

  RAGANYTHING_OUTPUT_DIR:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Legacy RAGAnything output directory; derived artifacts now live under workspace .system paths.

  RAGANYTHING_ENABLE_IMAGE_PROCESSING:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: "false"
    description: Legacy RAGAnything toggle; no longer used by the default Docling parser path.

  RAGANYTHING_ENABLE_TABLE_PROCESSING:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: "true"
    description: Legacy RAGAnything toggle; no longer used by the default Docling parser path.

  RAGANYTHING_ENABLE_EQUATION_PROCESSING:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: "true"
    description: Legacy RAGAnything toggle; no longer used by the default Docling parser path.

  RAG_ENABLE_RERANK:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: "false"
    description: Enable reranking stage in RAG.

  FILE_UNDERSTANDING_MODE:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: part-first
    description: Attachment understanding strategy on backend/agent.

  FILE_UNDERSTANDING_SYNC_MAX_BYTES:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Max bytes for synchronous file understanding.

  FILE_UNDERSTANDING_AGENT_READS_WORKSPACE:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Whether the agent reads workspace for file understanding.

  TAGGED_FILES_RAG_ONLY:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: "false"
    description: Restrict tagged file tools to RAG-only behavior.

  CURRENT_TURN_MULTIMODAL_MAX_BYTES:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Cap multimodal attachment bytes for current-turn proxying.

  # --- Langfuse ---
  LANGFUSE_ENABLED:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Agent-side toggle for Langfuse callbacks.

  LANGFUSE_TRACING_ENABLED:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Deprecated alias read by agent for Langfuse enablement.

  LANGFUSE_PUBLIC_KEY:
    owner: shared
    secret: true
    local: optional
    prod: optional
    default: ""
    description: Langfuse public API key.

  LANGFUSE_SECRET_KEY:
    owner: shared
    secret: true
    local: optional
    prod: optional
    default: ""
    description: Langfuse secret API key.

  LANGFUSE_BASE_URL:
    owner: shared
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Langfuse API base URL (self-hosted or cloud).

  LANGFUSE_HOST:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Deprecated alias for LANGFUSE_BASE_URL in agent.

  LANGFUSE_NEXTAUTH_URL:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Public Langfuse UI origin for workspace overview links.

  # --- Analytics / jobs ---
  ANALYTICS_TIMEZONE:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: UTC
    description: IANA timezone for daily reflection analytics.

  # --- Debugging ---
  DEBUG_AGENT_RUN_STREAM:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: "false"
    description: Verbose logging for agent run SSE proxying.

  AGENT_RESUME_IDLE_TIMEOUT_MS:
    owner: backend
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Idle timeout for resume polling in agent run service.

  # --- Skill sandbox (Kubernetes) ---
  HELPUDOC_SANDBOX_NAMESPACE:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: K8s namespace for skill sandbox Jobs.

  HELPUDOC_SANDBOX_BACKEND:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: auto
    description: "Skill script execution backend: local, kubernetes, or auto."

  POD_NAMESPACE:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: ""
    description: Fallback namespace from downward API.

  HELPUDOC_SANDBOX_IMAGE:
    owner: agent
    secret: false
    local: optional
    prod: optional
    default: gcr.io/my-rd-coe-demo-gen-ai/helpudoc-agent:latest
    description: Container image for sandbox skill runs. Must include workbook dependencies such as openpyxl and LibreOffice for XLSX skills.

  HELPUDOC_SANDBOX_WORKSPACE_PVC:
    owner: agent
    secret: false
    local: optional
    prod: optional
