steps:
  # 1. Build backend/frontend/agent in parallel + reuse layers via BuildKit inline cache.
  # Note: Docker layer caching only works across builds if we seed it from a previously-pushed image.
  # We do this by pulling :latest and passing --cache-from, then tagging :latest via add-tag (no duplicate push).
  - id: pull-backend-cache
    name: 'gcr.io/cloud-builders/docker'
    waitFor: ['-']
    entrypoint: 'bash'
    args: ['-c', 'docker pull gcr.io/$PROJECT_ID/helpudoc-backend:latest || true']

  - id: pull-frontend-cache
    name: 'gcr.io/cloud-builders/docker'
    waitFor: ['-']
    entrypoint: 'bash'
    args: ['-c', 'docker pull gcr.io/$PROJECT_ID/helpudoc-frontend:latest || true']

  - id: pull-agent-cache
    name: 'gcr.io/cloud-builders/docker'
    waitFor: ['-']
    entrypoint: 'bash'
    args: ['-c', 'docker pull gcr.io/$PROJECT_ID/helpudoc-agent:latest || true']

  - id: build-backend
    name: 'gcr.io/cloud-builders/docker'
    waitFor: ['pull-backend-cache']
    env: ['DOCKER_BUILDKIT=1']
    args:
      [
        'build',
        '-f',
        'backend/Dockerfile.gke',
        '--build-arg',
        'BUILDKIT_INLINE_CACHE=1',
        '--cache-from',
        'gcr.io/$PROJECT_ID/helpudoc-backend:latest',
        '-t',
        'gcr.io/$PROJECT_ID/helpudoc-backend:$BUILD_ID',
        '.',
      ]

  - id: build-frontend
    name: 'gcr.io/cloud-builders/docker'
    waitFor: ['pull-frontend-cache']
    env: ['DOCKER_BUILDKIT=1']
    args:
      [
        'build',
        '-f',
        'frontend/Dockerfile.gke',
        '--build-arg',
        'BUILDKIT_INLINE_CACHE=1',
        '--cache-from',
        'gcr.io/$PROJECT_ID/helpudoc-frontend:latest',
        '--build-arg',
        'VITE_GOOGLE_CLIENT_ID=$_VITE_GOOGLE_CLIENT_ID',
        '-t',
        'gcr.io/$PROJECT_ID/helpudoc-frontend:$BUILD_ID',
        '.',
      ]

  - id: build-agent
    name: 'gcr.io/cloud-builders/docker'
    waitFor: ['pull-agent-cache']
    env: ['DOCKER_BUILDKIT=1']
    args:
      [
        'build',
        '-f',
        'agent/Dockerfile.gke',
        '--build-arg',
        'BUILDKIT_INLINE_CACHE=1',
        '--cache-from',
        'gcr.io/$PROJECT_ID/helpudoc-agent:latest',
        '-t',
        'gcr.io/$PROJECT_ID/helpudoc-agent:$BUILD_ID',
        '.',
      ]

  - id: push-backend
    name: 'gcr.io/cloud-builders/docker'
    waitFor: ['build-backend']
    args: ['push', 'gcr.io/$PROJECT_ID/helpudoc-backend:$BUILD_ID']

  - id: push-frontend
    name: 'gcr.io/cloud-builders/docker'
    waitFor: ['build-frontend']
    args: ['push', 'gcr.io/$PROJECT_ID/helpudoc-frontend:$BUILD_ID']

  - id: push-agent
    name: 'gcr.io/cloud-builders/docker'
    waitFor: ['build-agent']
    args: ['push', 'gcr.io/$PROJECT_ID/helpudoc-agent:$BUILD_ID']

  # Tag :latest without pushing the same bytes twice.
  - id: tag-backend-latest
    name: 'gcr.io/cloud-builders/gcloud'
    waitFor: ['push-backend']
    args:
      [
        'container',
        'images',
        'add-tag',
        '--quiet',
        'gcr.io/$PROJECT_ID/helpudoc-backend:$BUILD_ID',
        'gcr.io/$PROJECT_ID/helpudoc-backend:latest',
      ]

  - id: tag-frontend-latest
    name: 'gcr.io/cloud-builders/gcloud'
    waitFor: ['push-frontend']
    args:
      [
        'container',
        'images',
        'add-tag',
        '--quiet',
        'gcr.io/$PROJECT_ID/helpudoc-frontend:$BUILD_ID',
        'gcr.io/$PROJECT_ID/helpudoc-frontend:latest',
      ]

  - id: tag-agent-latest
    name: 'gcr.io/cloud-builders/gcloud'
    waitFor: ['push-agent']
    args:
      [
        'container',
        'images',
        'add-tag',
        '--quiet',
        'gcr.io/$PROJECT_ID/helpudoc-agent:$BUILD_ID',
        'gcr.io/$PROJECT_ID/helpudoc-agent:latest',
      ]

  # 4. Update Image References in Manifests
  - id: rewrite-manifests
    name: 'ubuntu'
    waitFor: ['push-backend', 'push-frontend', 'push-agent']
    args:
      - 'bash'
      - '-c'
      - |
        # Replace image tags regardless of the current tag (latest or build id) to avoid sticky manifests.
        sed -i -E "s|image: gcr.io/$PROJECT_ID/helpudoc-backend:[^[:space:]]+|image: gcr.io/$PROJECT_ID/helpudoc-backend:$BUILD_ID|g" infra/gke/k8s/50-app.yaml
        sed -i -E "s|image: gcr.io/$PROJECT_ID/helpudoc-agent:[^[:space:]]+|image: gcr.io/$PROJECT_ID/helpudoc-agent:$BUILD_ID|g" infra/gke/k8s/50-app.yaml
        sed -i -E "s|image: gcr.io/$PROJECT_ID/helpudoc-frontend:[^[:space:]]+|image: gcr.io/$PROJECT_ID/helpudoc-frontend:$BUILD_ID|g" infra/gke/k8s/60-frontend.yaml

  # 5. Deploy to GKE
  - id: deploy
    name: 'gcr.io/cloud-builders/gke-deploy'
    waitFor: ['rewrite-manifests']
    args:
      - 'run'
      - '--filename=infra/gke/k8s/'
      - '--location=$_GKE_LOCATION'
      - '--cluster=$_GKE_CLUSTER'
      # Pulling the agent image can exceed the default 5m readiness wait (5GB+ image).
      - '--timeout=15m'

  # 5b. Ensure Postgres database for Langfuse exists, then restart Langfuse so migrations can run.
  - id: bootstrap-langfuse-db
    name: 'gcr.io/cloud-builders/kubectl'
    waitFor: ['deploy']
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=$_GKE_LOCATION'
      - 'CLOUDSDK_CONTAINER_CLUSTER=$_GKE_CLUSTER'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        set -eu
        PG_POD="$$(kubectl -n helpudoc get pods -l app=helpudoc-postgres -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
        if [ -z "$${PG_POD}" ]; then
          echo "Postgres pod not found; skipping Langfuse DB bootstrap."
          exit 0
        fi
        POSTGRES_DB="$$(kubectl -n helpudoc get configmap helpudoc-config -o jsonpath='{.data.POSTGRES_DB}')"
        POSTGRES_USER="$$(kubectl -n helpudoc get configmap helpudoc-config -o jsonpath='{.data.POSTGRES_USER}')"
        POSTGRES_PASSWORD="$$(kubectl -n helpudoc get secret helpudoc-secrets -o jsonpath='{.data.POSTGRES_PASSWORD}' | base64 --decode)"
        HAS_LANGFUSE="$$(kubectl -n helpudoc exec -i "$${PG_POD}" -- \
          env PGPASSWORD="$${POSTGRES_PASSWORD}" psql -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" \
          -tAc "SELECT 1 FROM pg_database WHERE datname = 'langfuse'")"
        HAS_LANGFUSE="$$(echo "$${HAS_LANGFUSE}" | tr -d '[:space:]')"
        CREATED_LANGFUSE_DB=false
        if [ "$${HAS_LANGFUSE}" != "1" ]; then
          kubectl -n helpudoc exec -i "$${PG_POD}" -- \
            env PGPASSWORD="$${POSTGRES_PASSWORD}" psql -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" \
            -v ON_ERROR_STOP=1 -c "CREATE DATABASE langfuse;"
          CREATED_LANGFUSE_DB=true
        fi
        if kubectl -n helpudoc get deploy helpudoc-langfuse-web >/dev/null 2>&1; then
          if [ "$${CREATED_LANGFUSE_DB}" = "true" ]; then
            kubectl -n helpudoc rollout restart deployment/helpudoc-langfuse-web deployment/helpudoc-langfuse-worker
          fi
          kubectl -n helpudoc rollout status deployment/helpudoc-langfuse-web --timeout=600s
          kubectl -n helpudoc rollout status deployment/helpudoc-langfuse-worker --timeout=600s
        fi

  # 6. Sync repo skills/ into skills PVC (workspace PVC is intentionally untouched).
  - id: sync-skills-pvc
    name: 'gcr.io/cloud-builders/kubectl'
    waitFor: ['deploy']
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=$_GKE_LOCATION'
      - 'CLOUDSDK_CONTAINER_CLUSTER=$_GKE_CLUSTER'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        set -eu
        APP_POD="$$(kubectl -n helpudoc get pods -l app=helpudoc-app -o jsonpath='{.items[0].metadata.name}')"
        test -n "$${APP_POD}"
        echo "Syncing repo skills/ to /app/skills in pod: $${APP_POD}"

        kubectl -n helpudoc exec "$${APP_POD}" -c backend -- sh -lc "set -eu; mkdir -p /app/skills; find /app/skills -mindepth 1 -maxdepth 1 -exec rm -rf {} +"
        tar -C skills -cf - . | kubectl -n helpudoc exec -i "$${APP_POD}" -c backend -- sh -lc "tar -xf - -C /app/skills"
        kubectl -n helpudoc exec "$${APP_POD}" -c backend -- sh -lc "test -f /app/skills/research/SKILL.md"

  # 7. Bootstrap default admin (optional, idempotent).
  - id: bootstrap-admin
    name: 'gcr.io/cloud-builders/kubectl'
    waitFor: ['deploy']
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=$_GKE_LOCATION'
      - 'CLOUDSDK_CONTAINER_CLUSTER=$_GKE_CLUSTER'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        set -eu

        ADMIN_EXTERNAL_ID="${_BOOTSTRAP_ADMIN_EXTERNAL_ID}"
        if [ -z "$${ADMIN_EXTERNAL_ID}" ]; then
          echo "Skipping admin bootstrap (_BOOTSTRAP_ADMIN_EXTERNAL_ID not set)."
          exit 0
        fi

        ADMIN_EMAIL="${_BOOTSTRAP_ADMIN_EMAIL}"
        if [ -z "$${ADMIN_EMAIL}" ]; then
          ADMIN_EMAIL="$${ADMIN_EXTERNAL_ID}"
        fi

        ADMIN_NAME="${_BOOTSTRAP_ADMIN_NAME}"
        if [ -z "$${ADMIN_NAME}" ]; then
          ADMIN_NAME="admin"
        fi

        PG_POD="$$(kubectl -n helpudoc get pods -l app=helpudoc-postgres -o jsonpath='{.items[0].metadata.name}')"
        test -n "$${PG_POD}"

        POSTGRES_DB="$$(kubectl -n helpudoc get configmap helpudoc-config -o jsonpath='{.data.POSTGRES_DB}')"
        POSTGRES_USER="$$(kubectl -n helpudoc get configmap helpudoc-config -o jsonpath='{.data.POSTGRES_USER}')"
        POSTGRES_PASSWORD="$$(kubectl -n helpudoc get secret helpudoc-secrets -o jsonpath='{.data.POSTGRES_PASSWORD}' | base64 --decode)"

        cat <<'SQL' | kubectl -n helpudoc exec -i "$${PG_POD}" -- env PGPASSWORD="$${POSTGRES_PASSWORD}" psql -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -v ON_ERROR_STOP=1 -v admin_external_id="$${ADMIN_EXTERNAL_ID}" -v admin_email="$${ADMIN_EMAIL}" -v admin_name="$${ADMIN_NAME}"
        INSERT INTO users (id, "externalId", "displayName", email, "isAdmin")
        VALUES ((md5(random()::text || clock_timestamp()::text))::uuid, :'admin_external_id', :'admin_name', NULLIF(:'admin_email', ''), true)
        ON CONFLICT ("externalId") DO UPDATE
        SET "displayName" = EXCLUDED."displayName",
            email = EXCLUDED.email,
            "isAdmin" = true,
            "updatedAt" = NOW();

        SELECT id, "externalId", email, "displayName", "isAdmin"
        FROM users
        WHERE "externalId" = :'admin_external_id';
        SQL

  # 8. Post-deploy drift guard (fails if PVC-backed runtime/skills are stale)
  - id: post-deploy-drift-guard
    name: 'gcr.io/cloud-builders/kubectl'
    waitFor: ['sync-skills-pvc', 'bootstrap-admin', 'bootstrap-langfuse-db']
    env:
      - 'CLOUDSDK_COMPUTE_ZONE=$_GKE_LOCATION'
      - 'CLOUDSDK_CONTAINER_CLUSTER=$_GKE_CLUSTER'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        set -eu
        kubectl -n helpudoc rollout status deployment/helpudoc-app --timeout=180s
        kubectl -n helpudoc rollout status deployment/helpudoc-frontend --timeout=180s

        APP_POD="$$(kubectl -n helpudoc get pods -l app=helpudoc-app -o jsonpath='{.items[0].metadata.name}')"
        test -n "$${APP_POD}"
        echo "Checking mounted runtime config and skills in pod: $${APP_POD}"

        kubectl -n helpudoc exec "$${APP_POD}" -c agent -- sh -lc "grep -q 'request_plan_approval' /agent/config/runtime.yaml"
        kubectl -n helpudoc exec "$${APP_POD}" -c agent -- sh -lc "grep -q 'request_plan_approval' /app/skills/research/SKILL.md"
        kubectl -n helpudoc exec "$${APP_POD}" -c agent -- python -c "import requests; data=requests.get('http://localhost:8001/agents', timeout=10).json(); tools=data['agents'][0]['tools']; assert 'request_plan_approval' in tools, tools; print('request_plan_approval available in /agents')"

  # 9. E2E check (fails build on mixed-content / localhost assets)
  - name: 'node:20-bookworm'
    waitFor: ['post-deploy-drift-guard']
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        if [ "${_RUN_E2E}" != "true" ]; then
          echo "Skipping e2e (set _RUN_E2E=true to enable)"
          exit 0
        fi

        export E2E_BASE_URL="${_E2E_BASE_URL}"
        echo "Waiting for ${_E2E_BASE_URL}/ to return 200..."
        node - <<'NODE'
        const base = process.env.E2E_BASE_URL;
        const url = new URL('/', base).toString();
        const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

        (async () => {
          for (let i = 0; i < 60; i += 1) {
            try {
              const res = await fetch(url, { redirect: 'follow' });
              if (res.status === 200) {
                process.exit(0);
              }
            } catch {}
            await sleep(5000);
          }
          console.error(`Timed out waiting for ${url}`);
          process.exit(1);
        })();
        NODE

        cd frontend
        npm ci
        npx playwright install --with-deps chromium
        npx playwright test --project=chromium

images:
  - 'gcr.io/$PROJECT_ID/helpudoc-backend:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/helpudoc-frontend:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/helpudoc-agent:$BUILD_ID'

substitutions:
  _GKE_CLUSTER: helpudoc-cluster
  _GKE_LOCATION: asia-southeast1-a
  _VITE_GOOGLE_CLIENT_ID: 16646144790-fvdv7liepgo18aiu20n3btmdr56l33pq.apps.googleusercontent.com
  _BOOTSTRAP_ADMIN_EXTERNAL_ID: ""
  _BOOTSTRAP_ADMIN_EMAIL: ""
  _BOOTSTRAP_ADMIN_NAME: ""
  _RUN_E2E: "true"
  _E2E_BASE_URL: "https://lc-demo.com"

options:
  logging: CLOUD_LOGGING_ONLY
