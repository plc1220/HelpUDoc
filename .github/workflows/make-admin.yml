name: Make User Admin

on:
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_LOCATION: ${{ secrets.GKE_LOCATION }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  USE_GKE_GCLOUD_AUTH_PLUGIN: "True"

jobs:
  make-admin:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Google auth mode
        id: auth_mode
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_PROVIDER }}
          WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
        run: |
          set -euo pipefail
          has_wif=false
          has_json=false
          if [[ -n "${WIF_PROVIDER}" && -n "${WIF_SERVICE_ACCOUNT}" ]]; then has_wif=true; fi
          if [[ -n "${CREDENTIALS_JSON}" ]]; then has_json=true; fi
          if [[ "${has_wif}" == "true" && "${has_json}" == "true" ]]; then
            echo "Configure only one auth method: WIF OR JSON key." >&2
            exit 1
          fi
          if [[ "${has_wif}" == "true" ]]; then echo "mode=wif" >> "${GITHUB_OUTPUT}"; exit 0; fi
          if [[ "${has_json}" == "true" ]]; then echo "mode=json" >> "${GITHUB_OUTPUT}"; exit 0; fi
          echo "Missing GCP auth secrets." >&2
          exit 1

      - name: Authenticate to Google Cloud (Workload Identity)
        if: ${{ steps.auth_mode.outputs.mode == 'wif' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Service Account Key)
        if: ${{ steps.auth_mode.outputs.mode == 'json' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Get GKE Credentials
        run: |
          set -euo pipefail
          gcloud container clusters get-credentials "${GKE_CLUSTER}" --location "${GKE_LOCATION}" --project "${PROJECT_ID}"

      - name: Set Admin
        run: |
          set -euo pipefail
          PG_POD="$(kubectl -n helpudoc get pods -l app=helpudoc-postgres -o jsonpath='{.items[0].metadata.name}')"
          test -n "${PG_POD}"
          
          POSTGRES_DB="$(kubectl -n helpudoc get configmap helpudoc-config -o jsonpath='{.data.POSTGRES_DB}')"
          POSTGRES_USER="$(kubectl -n helpudoc get configmap helpudoc-config -o jsonpath='{.data.POSTGRES_USER}')"
          POSTGRES_PASSWORD="$(kubectl -n helpudoc get secret helpudoc-secrets -o jsonpath='{.data.POSTGRES_PASSWORD}' | base64 --decode)"

          cat <<'SQL' | kubectl -n helpudoc exec -i "${PG_POD}" -- env PGPASSWORD="${POSTGRES_PASSWORD}" psql -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" -v ON_ERROR_STOP=1
          UPDATE users SET "isAdmin" = true WHERE email = 'licheng.phan@mile.cloud';
          SELECT id, "externalId", email, "displayName", "isAdmin" FROM users WHERE email = 'licheng.phan@mile.cloud';
          SQL
