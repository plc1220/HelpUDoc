name: Deploy to GKE

concurrency:
  group: deploy-gke-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      run_e2e:
        description: Run post-deploy E2E checks in Cloud Build
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_LOCATION: ${{ secrets.GKE_LOCATION }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  RUN_E2E: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_e2e || 'false' }}
  E2E_BASE_URL: ${{ vars.E2E_BASE_URL }}
  VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
  BOOTSTRAP_ADMIN_EXTERNAL_ID: ${{ secrets.BOOTSTRAP_ADMIN_EXTERNAL_ID }}
  BOOTSTRAP_ADMIN_EMAIL: ${{ secrets.BOOTSTRAP_ADMIN_EMAIL }}
  BOOTSTRAP_ADMIN_NAME: ${{ secrets.BOOTSTRAP_ADMIN_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Google auth mode
        id: auth_mode
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_PROVIDER }}
          WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
        run: |
          set -euo pipefail

          has_wif=false
          has_json=false

          if [[ -n "${WIF_PROVIDER}" && -n "${WIF_SERVICE_ACCOUNT}" ]]; then
            has_wif=true
          fi

          if [[ -n "${CREDENTIALS_JSON}" ]]; then
            has_json=true
          fi

          if [[ "${has_wif}" == "true" && "${has_json}" == "true" ]]; then
            echo "Configure only one auth method: WIF (GCP_WORKLOAD_PROVIDER + GCP_SERVICE_ACCOUNT) OR GCP_CREDENTIALS_JSON." >&2
            exit 1
          fi

          if [[ "${has_wif}" == "true" ]]; then
            echo "mode=wif" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${has_json}" == "true" ]]; then
            echo "mode=json" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Missing GCP auth secrets. Set either GCP_WORKLOAD_PROVIDER + GCP_SERVICE_ACCOUNT, or GCP_CREDENTIALS_JSON." >&2
          exit 1

      - name: Authenticate to Google Cloud (Workload Identity)
        if: ${{ steps.auth_mode.outputs.mode == 'wif' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Service Account Key)
        if: ${{ steps.auth_mode.outputs.mode == 'json' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Debug active GCP identity
        run: |
          set -euo pipefail
          echo "Auth mode: ${{ steps.auth_mode.outputs.mode }}"
          gcloud auth list --filter=status:ACTIVE
          gcloud config list --format='text(core.account,core.project)'

      - name: Trigger Cloud Build deploy
        run: |
          set -euo pipefail

          gcloud config set project "${PROJECT_ID}"

          substitutions=(
            "_GKE_LOCATION=${GKE_LOCATION}"
            "_GKE_CLUSTER=${GKE_CLUSTER}"
            "_RUN_E2E=${RUN_E2E}"
            "_E2E_BASE_URL=${E2E_BASE_URL:-https://lc-demo.com}"
            "_VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}"
          )

          if [[ -n "${BOOTSTRAP_ADMIN_EXTERNAL_ID}" ]]; then
            substitutions+=("_BOOTSTRAP_ADMIN_EXTERNAL_ID=${BOOTSTRAP_ADMIN_EXTERNAL_ID}")
          fi

          SUBS_CSV="$(IFS=,; echo "${substitutions[*]}")"

          gcloud builds submit . \
            --config=infra/cloudbuild.yaml \
            --project="${PROJECT_ID}" \
            --substitutions="${SUBS_CSV}"
