name: Deploy to GKE

on:
  push:
    branches:
      - master
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  GKE_LOCATION: ${{ secrets.GKE_LOCATION }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/helpudoc
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Google auth mode
        id: auth_mode
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_PROVIDER }}
          WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
        run: |
          set -euo pipefail

          has_wif=false
          has_json=false

          if [[ -n "${WIF_PROVIDER}" && -n "${WIF_SERVICE_ACCOUNT}" ]]; then
            has_wif=true
          fi

          if [[ -n "${CREDENTIALS_JSON}" ]]; then
            has_json=true
          fi

          if [[ "${has_wif}" == "true" && "${has_json}" == "true" ]]; then
            echo "Configure only one auth method: WIF (GCP_WORKLOAD_PROVIDER + GCP_SERVICE_ACCOUNT) OR GCP_CREDENTIALS_JSON." >&2
            exit 1
          fi

          if [[ "${has_wif}" == "true" ]]; then
            echo "mode=wif" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${has_json}" == "true" ]]; then
            echo "mode=json" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "Missing GCP auth secrets. Set either GCP_WORKLOAD_PROVIDER + GCP_SERVICE_ACCOUNT, or GCP_CREDENTIALS_JSON. If this run is from a fork/Dependabot, use repo/dependabot secrets or restrict deploy triggers." >&2
          exit 1

      - name: Authenticate to Google Cloud (Workload Identity)
        if: ${{ steps.auth_mode.outputs.mode == 'wif' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud (Service Account Key)
        if: ${{ steps.auth_mode.outputs.mode == 'json' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev"

      - name: Build images
        run: |
          docker build -t "${REGISTRY}/helpudoc-backend:${IMAGE_TAG}" backend
          docker build -f agent/Dockerfile -t "${REGISTRY}/helpudoc-agent:${IMAGE_TAG}" .
          docker build -f frontend/Dockerfile.gke \
            --build-arg VITE_API_URL=/api \
            --build-arg VITE_GOOGLE_CLIENT_ID="${{ secrets.VITE_GOOGLE_CLIENT_ID }}" \
            -t "${REGISTRY}/helpudoc-frontend:${IMAGE_TAG}" .

      - name: Push images
        run: |
          docker push "${REGISTRY}/helpudoc-backend:${IMAGE_TAG}"
          docker push "${REGISTRY}/helpudoc-agent:${IMAGE_TAG}"
          docker push "${REGISTRY}/helpudoc-frontend:${IMAGE_TAG}"

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}

      - name: Apply manifests
        run: |
          set -euo pipefail

          kubectl apply -f infra/gke/k8s/00-namespace.yaml
          if [[ -f infra/gke/k8s/10-secrets.yaml ]]; then
            kubectl apply -f infra/gke/k8s/10-secrets.yaml
          else
            echo "Skipping infra/gke/k8s/10-secrets.yaml (not committed)."
          fi
          if [[ -f infra/gke/k8s/20-configmap.yaml ]]; then
            kubectl apply -f infra/gke/k8s/20-configmap.yaml
          else
            echo "Skipping infra/gke/k8s/20-configmap.yaml (not committed)."
          fi
          kubectl -n helpudoc get secret helpudoc-secrets >/dev/null
          kubectl -n helpudoc get configmap helpudoc-config >/dev/null
          kubectl apply -f infra/gke/k8s/30-storage.yaml
          kubectl apply -f infra/gke/k8s/40-postgres.yaml
          kubectl apply -f infra/gke/k8s/41-redis.yaml
          kubectl apply -f infra/gke/k8s/42-minio.yaml
          kubectl apply -f infra/gke/k8s/43-minio-setup.yaml
          kubectl apply -f infra/gke/k8s/50-app.yaml
          kubectl apply -f infra/gke/k8s/60-frontend.yaml

      - name: Update images
        run: |
          kubectl -n helpudoc set image deployment/helpudoc-app \
            backend="${REGISTRY}/helpudoc-backend:${IMAGE_TAG}" \
            agent="${REGISTRY}/helpudoc-agent:${IMAGE_TAG}"
          kubectl -n helpudoc set image deployment/helpudoc-frontend \
            frontend="${REGISTRY}/helpudoc-frontend:${IMAGE_TAG}"

      - name: Rollout status
        run: |
          kubectl -n helpudoc rollout status deployment/helpudoc-app
          kubectl -n helpudoc rollout status deployment/helpudoc-frontend

      - name: Sync skills to persistent volume
        run: |
          set -euo pipefail

          APP_POD="$(kubectl -n helpudoc get pods -l app=helpudoc-app -o jsonpath='{.items[0].metadata.name}')"
          test -n "${APP_POD}"
          echo "Syncing repo skills/ to /app/skills in pod ${APP_POD}"

          # Skills are PVC-backed and should mirror the repo on deploy.
          # Only /app/skills is touched; /app/workspaces (user data) is untouched.
          kubectl -n helpudoc exec "${APP_POD}" -c backend -- sh -lc 'set -eu; mkdir -p /app/skills; find /app/skills -mindepth 1 -maxdepth 1 -exec rm -rf {} +'
          tar -C skills -cf - . | kubectl -n helpudoc exec -i "${APP_POD}" -c backend -- sh -lc 'tar -xf - -C /app/skills'

          kubectl -n helpudoc exec "${APP_POD}" -c backend -- sh -lc 'test -f /app/skills/research/SKILL.md'
