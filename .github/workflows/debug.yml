name: Debug Backend Env
on: workflow_dispatch
env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_LOCATION: ${{ secrets.GKE_LOCATION }}
  GKE_CLUSTER: ${{ secrets.GKE_CLUSTER }}
  USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - id: auth_mode
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_PROVIDER }}
          WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
        run: |
          if [[ -n "${WIF_PROVIDER}" ]]; then echo "mode=wif" >> "${GITHUB_OUTPUT}"; else echo "mode=json" >> "${GITHUB_OUTPUT}"; fi
      - if: ${{ steps.auth_mode.outputs.mode == 'wif' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - if: ${{ steps.auth_mode.outputs.mode == 'json' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS_JSON }}
      - uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin
      - run: gcloud container clusters get-credentials "${GKE_CLUSTER}" --location "${GKE_LOCATION}" --project "${PROJECT_ID}"
      - run: |
          APP_POD="$(kubectl -n helpudoc get pods -l app=helpudoc-app -o jsonpath='{.items[0].metadata.name}')"
          kubectl -n helpudoc exec "$APP_POD" -c backend -- node -e 'const http = require("http"); const data = JSON.stringify({ message: "Hello", history: [], forceReset: false }); const options = { hostname: "localhost", port: 8001, path: "/agents/fast/workspace/test-123/chat", method: "POST", headers: { "Content-Type": "application/json", "Content-Length": data.length } }; const req = http.request(options, res => { let body = ""; res.on("data", chunk => body += chunk); res.on("end", () => console.log(`STATUS: ${res.statusCode} BODY: ${body}`)); }); req.write(data); req.end();'
